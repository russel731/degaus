<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Тест лендинга</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px;
      background: #f5f5f5;
      color: #111;
    }
    .box {
      max-width: 800px;
      margin: 60px auto;
      background: #fff;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
    }
    h1 { margin-top: 0; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Лендинг работает</h1>
    <p>GitHub Pages подключён правильно.</p>
    <p>Теперь можно вставлять основной сайт.</p>
  </div>
</body>
</html>
