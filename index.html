  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {

      --orange: #ff6a00;
      --dark: #0f1117;
      --gray: #1e2130;
      --gray2: #2a2e42;

      --white: #ffffff;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--dark);
      color: var(--text);
      line-height: 1.6;
    }

    /* ===== HEADER ===== */
    header {
      background: rgba(15,17,23,0.95);

      border-bottom: 1px solid #1e2130;
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;

    .logo { font-size: 1.1rem; font-weight: 700; color: var(--white); }
    .logo span { color: var(--blue); }
    .header-cta {

      transition: background 0.2s;

    .header-cta:hover { background: #e05a00; }

    .hero::before {

      pointer-events: none;

    .badge {

      background: rgba(26,109,255,0.15);

      border-radius: 20px;
      padding: 5px 16px; font-size: 0.82rem; font-weight: 600;

    }
    .hero h1 {
      font-size: clamp(1.9rem, 5vw, 3.2rem);
      font-weight: 900;
      color: var(--white);
      line-height: 1.15;
      margin-bottom: 18px;

    .hero-btns {

    .btn-primary {

    /* ===== PRODUCT IMAGE ===== */
    .product-section {
      background: var(--gray);

    }
    .product-inner {

    }
    @media(max-width:700px) { .product-inner { grid-template-columns: 1fr; } }

    .product-img-wrap img {

      display: flex; align-items: center; justify-content: center;

    .card {

      border-radius: 16px; padding: 28px 22px;

    .item-tag {
      background: var(--gray);

    /* ===== CTA ===== */
    .cta-section {

    .cta-section h2 {

    .cta-section p { color: var(--muted); font-size: 1rem; margin-bottom: 36px; }
    .cta-price {

    .cta-price span { color: var(--blue); }
    .cta-note { color: var(--muted); font-size: 0.88rem; margin-bottom: 32px; }

    /* ===== TRUST ===== */

    .trust-icon { font-size: 1.8rem; }

    /* ===== FOOTER ===== */
    footer {

    }
    footer a { color: var(--muted); text-decoration: underline; }

    /* ===== FLOATING WA ===== */
    .float-wa {

      transition: transform 0.2s;

    }

  </style>
